<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Endale</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/mapbuilder.css">
</head>
<body>

<div id="shell">

  <nav id="sidebar">
    <div class="site-brand">
      <div class="site-title">Endale</div>
      <div class="site-tagline">Daggerheart Campaign</div>
    </div>
    <div id="core-nav"></div>
    <div class="nav-sep-label">Reference</div>
    <div id="ref-nav"></div>
    <div class="nav-sep-label nav-sep-label-groups">Card Groups</div>
    <div id="nav-tree"></div>
    <div id="sidebar-footer">
      <button id="nav-add-section-btn" class="sidebar-footer-btn">+ Group</button>
      <button id="nav-export-state-btn" class="sidebar-footer-btn" title="Export all local changes to endale-state.json for use with bake_state.py">Export State</button>
      <button id="nav-edit-btn" class="sidebar-footer-btn">Edit</button>
    </div>
  </nav>

  <main id="content">
    <div id="page-header">
      <h1 id="page-title"></h1>
      <p id="page-subtitle"></p>
    </div>
    <div id="page-body"></div>
  </main>

</div>

<!-- ── Card creation wizard (shared across all pages) ── -->
<div id="card-wizard" class="board-modal hidden">
  <div class="board-wizard-inner">
    <div class="board-modal-header">
      <span class="board-modal-title">New Card</span>
      <div class="wiz-steps">
        <span id="wiz-step-1" class="wiz-step active">1</span>
        <span class="wiz-step-line"></span>
        <span id="wiz-step-2" class="wiz-step">2</span>
      </div>
      <button id="card-wizard-close" class="board-modal-close-btn">✕</button>
    </div>
    <div id="card-wizard-body" class="board-wizard-body"></div>
  </div>
</div>

<!-- ── Baked state (generated by bake_state.py) ── -->
<script src="data/state/local-state.js"></script>

<!-- ── App ── -->
<script src="js/themes.js"></script>
<script src="js/cards.js"></script>
<script src="js/mapbuilder.js"></script>
<script src="js/art-manifest.js"></script>
<script src="js/images.js"></script>
<script src="js/board.js"></script>
<script src="js/app.js"></script>

<!-- ── Data files — add new pages here as they are created ── -->
<!-- Characters -->
<script src="data/characters/player-characters.js"></script>
<script src="data/characters/key-individuals.js"></script>
<script src="data/characters/lionguard.js"></script>
<script src="data/characters/applecrumb-faction.js"></script>
<script src="data/characters/ratkin.js"></script>
<script src="data/characters/fonn-civilians.js"></script>
<!-- Locations -->
<script src="data/locations/fonn.js"></script>
<!-- Story -->
<script src="data/story/threads.js"></script>
<!-- Sessions -->
<script src="data/sessions/recap.js"></script>
<script src="data/sessions/log.js"></script>
<script src="data/sessions/board.js"></script>
<!-- World -->
<script src="data/world/overview.js"></script>
<!-- Lore -->
<script src="data/lore/items.js"></script>
<!-- Rules -->
<script src="data/rules/dm-cheatsheet.js"></script>

</body>
</html>
